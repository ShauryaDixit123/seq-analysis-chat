<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .title }}</title>
  <link rel="stylesheet" href="/static/css/chat.css?v=4" />
</head>
<body>
  <main class="chat-app">
    <header class="chat-header">
      <h1>Chat</h1>
      <p class="chat-subtitle">Send a message or attach files</p>
    </header>

    <section id="messages" class="chat-messages" aria-live="polite"></section>

    <form id="chat-form" class="chat-composer" enctype="multipart/form-data">
      <div class="composer-options">
        <label class="process-label" for="process-type">Analysis</label>
        <select id="process-type" name="process_type" class="process-select">
          <option value="none">None (chat only)</option>
          <option value="dynamic_programming" selected>Dynamic programming</option>
          <option value="global_alignment">Global alignment</option>
          <option value="local_alignment">Local alignment</option>
        </select>
      </div>
      <div class="composer-row">
        <label class="attach-btn" for="file-input" title="Attach files">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
          <span>Attach</span>
        </label>
        <input type="file" id="file-input" name="files" multiple hidden />
        <textarea
          id="message-input"
          name="message"
          rows="1"
          placeholder="Type a message…"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="send-btn">Send</button>
      </div>

      <ul id="file-preview" class="file-preview" hidden></ul>
    </form>
  </main>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="/static/js/chat.js?v=4"></script>
</body>
</html>
